name: bill_scan
description: Offline PDF bill analyzer — pdfx + ML Kit OCR + regex parser. No API keys needed.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Renders PDF pages to images AND provides text-layer extraction
  pdfx: ^2.6.0

  # On-device ML Kit OCR — no internet, no API key
  google_mlkit_text_recognition: ^0.13.0

  # File picker for selecting PDFs
  file_picker: ^8.0.0+1

  # Temp directory for intermediate render images
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true