name: bill_scan
description: Offline PDF bill analyzer — ML Kit OCR + rule-based regex parsing. No API keys needed.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # PDF rendering — converts PDF pages to images for ML Kit
  pdfx: ^2.6.0

  # ML Kit on-device OCR (Latin script covers English + European languages)
  google_mlkit_text_recognition: ^0.13.0

  # File picker for selecting PDF from device storage
  file_picker: ^8.0.0+1

  # Temp directory for intermediate image files
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true